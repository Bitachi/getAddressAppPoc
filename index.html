<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>現在地確認</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --border: #2a2f3d;
      --accent: #00e5a0;
      --accent-dim: rgba(0, 229, 160, 0.15);
      --accent-glow: rgba(0, 229, 160, 0.4);
      --text: #e8eaf0;
      --text-muted: #6b7280;
      --danger: #ff4d6d;
      --warn: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* 背景グリッド */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
    }

    /* 背景アクセントライト */
    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .card-title {
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-family: 'Share Tech Mono', monospace;
    }

    /* ボタン */
    .btn {
      width: 100%;
      padding: 18px;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 10px;
      color: var(--accent);
      font-size: 16px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn:hover:not(:disabled) {
      background: var(--accent-dim);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-icon {
      font-size: 20px;
    }

    /* ステータス表示 */
    .status-box {
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      min-height: 80px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .status-label {
      font-size: 11px;
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .status-value {
      font-size: 15px;
      line-height: 1.6;
      word-break: break-all;
    }

    .status-value.address {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .status-value.loading {
      color: var(--warn);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-value.error {
      color: var(--danger);
    }

    /* ローディングスピナー */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--warn);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 座標表示 */
    .coords-box {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 6px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      display: none;
    }

    .coords-box.visible {
      display: block;
    }

    .coords-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* コピーボタン */
    .copy-btn {
      margin-top: 14px;
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: none;
    }

    .copy-btn.visible {
      display: block;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .copy-btn.copied {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* タイムスタンプ */
    .timestamp {
      margin-top: 16px;
      text-align: right;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      display: none;
    }

    .timestamp.visible {
      display: block;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="dot"></div>
    <span class="card-title">Location Checker</span>
  </div>

  <button class="btn" id="locBtn" onclick="getLocation()">
    <span class="btn-icon">📍</span>
    現在地の住所を取得
  </button>

  <div class="status-box" id="statusBox">
    <span class="status-label">STATUS</span>
    <span class="status-value" id="statusValue" style="color: var(--text-muted);">ボタンを押してください</span>
  </div>

  <div class="coords-box" id="coordsBox">
    <span class="coords-text" id="coordsText"></span>
  </div>

  <button class="copy-btn" id="copyBtn" onclick="copyAddress()">📋 住所をコピー</button>

  <div class="timestamp" id="timestamp"></div>
</div>

<script>
  // ★ここを自分のAPI GatewayのエンドポイントURLに変更してください
  const API_ENDPOINT = 'https://du1vdmzkwb.execute-api.ap-northeast-1.amazonaws.com/geocode';

  let currentAddress = '';

  function getLocation() {
    const btn = document.getElementById('locBtn');
    const statusValue = document.getElementById('statusValue');
    const coordsBox = document.getElementById('coordsBox');
    const copyBtn = document.getElementById('copyBtn');
    const timestamp = document.getElementById('timestamp');

    // ブラウザのGeolocation API対応チェック
    if (!navigator.geolocation) {
      showError('このブラウザはGPS取得に対応していません');
      return;
    }

    // ローディング状態
    btn.disabled = true;
    coordsBox.classList.remove('visible');
    copyBtn.classList.remove('visible');
    timestamp.classList.remove('visible');
    currentAddress = '';

    statusValue.className = 'status-value loading';
    statusValue.innerHTML = '<div class="spinner"></div>GPS取得中...';

    navigator.geolocation.getCurrentPosition(
      async (position) => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        // 座標表示
        document.getElementById('coordsText').textContent =
          `LAT: ${lat.toFixed(6)}  LNG: ${lng.toFixed(6)}`;
        coordsBox.classList.add('visible');

        // Lambdaへリクエスト
        statusValue.innerHTML = '<div class="spinner"></div>住所に変換中...';

        try {
          const res = await fetch(API_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ lat, lng })
          });

          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const data = await res.json();

          if (data.address) {
            currentAddress = data.address;
            statusValue.className = 'status-value address';
            statusValue.textContent = currentAddress;
            copyBtn.classList.add('visible');

            // タイムスタンプ
            const now = new Date();
            timestamp.textContent = `取得時刻: ${now.toLocaleTimeString('ja-JP')}`;
            timestamp.classList.add('visible');
          } else {
            showError('住所の取得に失敗しました');
          }

        } catch (e) {
          showError(`通信エラー: ${e.message}`);
        }

        btn.disabled = false;
      },
      (err) => {
        const messages = {
          1: 'GPS使用が拒否されました。ブラウザの設定から位置情報を許可してください。',
          2: '位置情報を取得できませんでした',
          3: 'GPS取得がタイムアウトしました'
        };
        showError(messages[err.code] || 'GPS取得エラー');
        btn.disabled = false;
      },
      {
        enableHighAccuracy: true,  // 高精度GPS
        timeout: 15000,
        maximumAge: 0              // キャッシュ不使用（常に最新取得）
      }
    );
  }

  function showError(msg) {
    const statusValue = document.getElementById('statusValue');
    statusValue.className = 'status-value error';
    statusValue.textContent = '⚠ ' + msg;
  }

  async function copyAddress() {
    if (!currentAddress) return;
    const btn = document.getElementById('copyBtn');
    try {
      await navigator.clipboard.writeText(currentAddress);
      btn.textContent = '✓ コピーしました';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '📋 住所をコピー';
        btn.classList.remove('copied');
      }, 2000);
    } catch {
      // フォールバック
      const ta = document.createElement('textarea');
      ta.value = currentAddress;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
  }
</script>
</body>
</html>
